<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scentova - Feedback</title>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        /* General Styles */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f9;
            color: #333;
            display: flex;
        }

        .dashboard {
            display: flex;
            width: 100%;
        }

        .sidebar img {
            width: 100%;
            max-width: 150px;
            height: auto;
            margin: 0 auto 20px;
            display: block;
            border-radius: 10px;
        }

        .sidebar {
            width: 250px;
            background: linear-gradient(180deg, #1e3a8a, #0f2c6d);
            color: white;
            height: 100vh;
            position: fixed;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2);
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            color: #fff;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
            margin: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar ul li {
            margin: 0;
        }

        .sidebar ul li a {
    color: white;
    text-decoration: none;
    font-size: 16px;
    padding: 12px 15px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background-color 0.3s ease;
}

.sidebar ul li a:hover {
    background-color: rgba(255, 255, 255, 0.1);
}

.sidebar ul li a.active {
    background-color: rgba(255, 255, 255, 0.2);
    font-weight: bold;
}

.sidebar ul li a i {
    font-size: 18px;
}

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 20px;
            margin-left: 250px; /* Adjusted to match sidebar width */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .feedback-container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
            width: 400px;
            text-align: center;
        }

        .feedback-container h2 {
            margin-bottom: 20px;
            color: #1e3a8a;
        }

        .feedback-container textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 16px;
            resize: none;
        }

        .feedback-container button {
            background: linear-gradient(90deg, #1e3a8a, #0f2c6d);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }

        .feedback-container button:hover {
            background: linear-gradient(90deg, #0f2c6d, #1e3a8a);
        }
        .sidebar img {
            width: 100%;
            max-width: 150px;
            height: auto;
            margin: 0 auto 20px;
            display: block;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <div class="sidebar">
            <h2>SCENTOVA</h2>
            <img src="{{ url_for('static', filename='scent-logo-new.png') }}" alt="Scentova Logo" class="sidebar-image">
            <ul>
                <li><a href="{{ url_for('home') }}" class="active"><i class="fas fa-home"></i>Home</a></li>
                <li><a href="{{ url_for('cart') }}"><i class="fas fa-shopping-cart"></i>Cart</a></li>
                <li><a href="{{ url_for('order_history_page') }}"><i class="fas fa-history"></i>Order History</a></li>
                <li><a href="{{ url_for('profile') }}"><i class="fas fa-user"></i>Profile</a></li>
                <li><a href="{{ url_for('feedback') }}"><i class="fas fa-comment"></i>Feedback</a></li>
                
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="feedback-container">
                <h2>We'd Love Your Feedback!</h2>
                <textarea id="feedback" placeholder="Tell us about your experience..."></textarea>
                <button onclick="submitFeedback()">Submit Feedback</button>
            </div>
        </div>
    </div>

    <script>
        // Function to submit feedback
        function submitFeedback() {
            const feedback = document.getElementById("feedback").value;
            if (!feedback) {
                alert("Please enter your feedback before submitting.");
                return;
            }

            // Save feedback to localStorage
            let feedbacks = JSON.parse(localStorage.getItem("feedbacks")) || [];
            feedbacks.push(feedback);
            localStorage.setItem("feedbacks", JSON.stringify(feedbacks));

            alert("Thank you for your feedback!");
            window.location.href = "history.html"; // Redirect to history page
        }
    </script>
</body>
</html>
