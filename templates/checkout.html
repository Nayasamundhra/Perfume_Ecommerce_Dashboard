<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scentova - Checkout</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        /* General Styles */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f9;
            color: #333;
        }

        .dashboard {
            display: flex;
        }

        .sidebar {
            width: 250px;
            background: linear-gradient(180deg, #1e3a8a, #0f2c6d);
            color: white;
            height: 100vh;
            position: fixed;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2);
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            color: #fff;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
            margin: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar ul li {
            margin: 0;
        }

        .sidebar ul li a {
    color: white;
    text-decoration: none;
    font-size: 16px;
    padding: 12px 15px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background-color 0.3s ease;
}

.sidebar ul li a:hover {
    background-color: rgba(255, 255, 255, 0.1);
}

.sidebar ul li a.active {
    background-color: rgba(255, 255, 255, 0.2);
    font-weight: bold;
}

.sidebar ul li a i {
    font-size: 18px;
}

        

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 20px;
            margin-left: 250px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #1e3a8a, #0f2c6d);
            padding: 20px 30px;
            color: white;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        header h1 {
            margin: 0;
            font-size: 28px;
        }

        .add-to-cart-icon {
            position: relative;
            cursor: pointer;
        }

        .add-to-cart-icon i {
            font-size: 28px;
            color: white;
        }

        .add-to-cart-icon .cart-count {
            position: absolute;
            top: -10px;
            right: -10px;
            background-color: #ff4757;
            color: white;
            border-radius: 50%;
            padding: 5px 10px;
            font-size: 14px;
        }

        /* Checkout Form */
        .checkout-form {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .checkout-form h2 {
            margin: 0 0 20px;
            font-size: 24px;
            color: #1e3a8a;
        }

        .checkout-form label {
            display: block;
            margin-bottom: 10px;
            font-size: 16px;
            color: #333;
        }

        .checkout-form input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        .checkout-form button {
            background: linear-gradient(90deg, #1e3a8a, #0f2c6d);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-size: 16px;
            width: 100%;
        }

        .checkout-form button:hover {
            background: linear-gradient(90deg, #0f2c6d, #1e3a8a);
        }
        .sidebar img {
            width: 100%;
            max-width: 150px;
            height: auto;
            margin: 0 auto 20px;
            display: block;
            border-radius: 10px;
        }

        /* Order Summary */
        .order-summary {
            margin-top: 20px;
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .order-summary h3 {
            margin-top: 0;
            color: #1e3a8a;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .summary-total {
            font-weight: bold;
            font-size: 18px;
            margin-top: 10px;
        }

        /* Loading indicator */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            font-weight: bold;
            color: #1e3a8a;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <div class="sidebar">
            <h2>SCENTOVA</h2>
            <img src="{{ url_for('static', filename='scent-logo-new.png') }}" alt="Scentova Logo" class="sidebar-image">
            
                <ul>
                    <li><a href="{{ url_for('home') }}" class="active"><i class="fas fa-home"></i>Home</a></li>
                    <li><a href="{{ url_for('cart') }}"><i class="fas fa-shopping-cart"></i>Cart</a></li>
                    <li><a href="{{ url_for('order_history_page') }}"><i class="fas fa-history"></i>Order History</a></li>
                    <li><a href="{{ url_for('profile') }}"><i class="fas fa-user"></i>Profile</a></li>
                    <li><a href="{{ url_for('feedback') }}"><i class="fas fa-comment"></i>Feedback</a></li>
                </ul>
           
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <header>
                <h1>Scentova</h1>
                <div class="add-to-cart-icon" onclick="navigateToCart()">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </div>
            </header>

            <!-- Order Summary -->
            <div class="order-summary">
                <h3>Order Summary</h3>
                <div id="orderSummary">
                    <!-- Order items will be listed here -->
                </div>
                <div class="summary-total">
                    Total: $<span id="orderTotal">0.00</span>
                </div>
            </div>

            <!-- Checkout Form -->
<div class="checkout-form">
    <h2>Checkout Details</h2>
    <label for="shippingAddress">Shipping Address</label>
    <input type="text" id="shippingAddress" placeholder="Enter your shipping address" required>
    
    <label for="paymentMethod">Payment Method</label>
    <select id="paymentMethod" required>
        <option value="">Select a payment method</option>
        <option value="Credit Card">Credit Card</option>
        <option value="Debit Card">Debit Card</option>
        <option value="PayPal">PayPal</option>
        <option value="Cash on Delivery">Cash on Delivery</option>
    </select>
    
    <div class="loading" id="loading">Processing your order...</div>
    <button onclick="placeOrder()" id="placeOrderBtn">Place Order</button>
</div>
        </div>
    </div>

    <script>
        const user_id = 1; // Replace with actual user ID
        
        // Function to navigate to cart
        function navigateToCart() {
            window.location.href = "/cart";
        }

        // Fetch cart count
        function fetchCartCount() {
            fetch(`/api/cart-count?user_id=${user_id}`)
                .then(response => response.json())
                .then(data => {
                    document.getElementById("cartCount").textContent = data.count;
                })
                .catch(error => console.error("Error fetching cart count:", error));
        }

        // Load cart items for order summary
        function loadCartItems() {
            fetch(`/api/cart?user_id=${user_id}`)
                .then(response => response.json())
                .then(cartItems => {
                    const orderSummary = document.getElementById("orderSummary");
                    let total = 0;
                    
                    if (cartItems.length === 0) {
                        orderSummary.innerHTML = "<p>Your cart is empty. Add some items before checkout.</p>";
                        document.getElementById("placeOrderBtn").disabled = true;
                        return;
                    }
                    
                    let summaryHTML = "";
                    cartItems.forEach(item => {
                        summaryHTML += `
                            <div class="summary-item">
                                <div>${item.name} x ${item.quantity}</div>
                                <div>$${(item.price * item.quantity).toFixed(2)}</div>
                            </div>
                        `;
                        total += item.price * item.quantity;
                    });
                    
                    orderSummary.innerHTML = summaryHTML;
                    document.getElementById("orderTotal").textContent = total.toFixed(2);
                })
                .catch(error => console.error("Error loading cart items:", error));
        }

        // Place Order
function placeOrder() {
    const shippingAddress = document.getElementById("shippingAddress").value;
    const paymentMethod = document.getElementById("paymentMethod").value;
    
    // Basic validation
    if (!shippingAddress || !paymentMethod) {
        alert("Please fill out all required fields");
        return;
    }
    
    // Show loading indicator
    document.getElementById("loading").style.display = "block";
    document.getElementById("placeOrderBtn").disabled = true;

    // Fetch cart items
    fetch(`/api/cart?user_id=${user_id}`)
        .then(response => response.json())
        .then(cartItems => {
            if (cartItems.length === 0) {
                alert("Your cart is empty. Add some items before checking out.");
                document.getElementById("loading").style.display = "none";
                document.getElementById("placeOrderBtn").disabled = false;
                return;
            }
            
            // Calculate total amount
            const totalAmount = cartItems.reduce((total, item) => total + item.total_price, 0);

            // Prepare order data
            const orderData = {
                user_id: user_id,
                shipping_address: shippingAddress,
                payment_method: paymentMethod, // Use the selected payment method
                total_amount: totalAmount,
                items: cartItems.map(item => ({
                    perfume_id: item.perfume_id,
                    quantity: item.quantity,
                    price: item.price
                }))
            };

            console.log("Sending order data:", orderData);

            // Send order data to the backend
            fetch('/api/place-order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! Status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    console.log("Order response:", data);
                    alert("Order placed successfully!");
                    window.location.href = "/order-history"; // Redirect to order history
                })
                .catch(error => {
                    console.error("Error placing order:", error);
                    alert("Error placing order. Please try again.");
                    document.getElementById("loading").style.display = "none";
                    document.getElementById("placeOrderBtn").disabled = false;
                });
        })
        .catch(error => {
            console.error("Error fetching cart items:", error);
            alert("Error fetching cart items. Please try again.");
            document.getElementById("loading").style.display = "none";
            document.getElementById("placeOrderBtn").disabled = false;
        });
}

        // Initialize
        document.addEventListener("DOMContentLoaded", function() {
            fetchCartCount();
            loadCartItems();
        });
    </script>
</body>
</html>
