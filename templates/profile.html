<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scentova - Profile</title>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        /* General Styles */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f9;
            color: #333;
        }

        .dashboard {
            display: flex;
        }

        .sidebar {
            width: 250px;
            background: linear-gradient(180deg, #1e3a8a, #0f2c6d);
            color: white;
            height: 100vh;
            position: fixed;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2);
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            color: #fff;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
            margin: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar ul li {
            margin: 0;
        }

        .sidebar ul li a {
    color: white;
    text-decoration: none;
    font-size: 16px;
    padding: 12px 15px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background-color 0.3s ease;
}

.sidebar ul li a:hover {
    background-color: rgba(255, 255, 255, 0.1);
}

.sidebar ul li a.active {
    background-color: rgba(255, 255, 255, 0.2);
    font-weight: bold;
}

.sidebar ul li a i {
    font-size: 18px;
}

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 20px;
            margin-left: 250px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #1e3a8a, #0f2c6d);
            padding: 20px 30px;
            color: white;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        header h1 {
            margin: 0;
            font-size: 28px;
        }

        .add-to-cart-icon {
            position: relative;
            cursor: pointer;
        }

        .add-to-cart-icon i {
            font-size: 28px;
            color: white;
        }

        .add-to-cart-icon .cart-count {
            position: absolute;
            top: -10px;
            right: -10px;
            background-color: #ff4757;
            color: white;
            border-radius: 50%;
            padding: 5px 10px;
            font-size: 14px;
        }

        /* Profile Form */
        .profile-form {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .profile-form h2 {
            margin: 0 0 20px;
            font-size: 24px;
            color: #1e3a8a;
        }

        .profile-form label {
            display: block;
            margin-bottom: 10px;
            font-size: 16px;
            color: #333;
        }

        .profile-form input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        .profile-form button {
            background: linear-gradient(90deg, #1e3a8a, #0f2c6d);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-size: 16px;
            width: 100%;
        }

        .profile-form button:hover {
            background: linear-gradient(90deg, #0f2c6d, #1e3a8a);
        }
        .sidebar img {
            width: 100%;
            max-width: 150px;
            height: auto;
            margin: 0 auto 20px;
            display: block;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <div class="sidebar">
            <h2>SCENTOVA</h2>
            <img src="{{ url_for('static', filename='scent-logo-new.png') }}" alt="Scentova Logo" class="sidebar-image">
            <ul>
                <li><a href="{{ url_for('home') }}"><i class="fas fa-home"></i>Home</a></li>
                <li><a href="{{ url_for('cart') }}"><i class="fas fa-shopping-cart"></i>Cart</a></li>
                <li><a href="{{ url_for('order_history_page') }}" class="active"><i class="fas fa-history"></i>Order History</a></li>
                <li><a href="{{ url_for('profile') }}"><i class="fas fa-user"></i>Profile</a></li>
                <li><a href="{{ url_for('feedback') }}"><i class="fas fa-comment"></i>Feedback</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <header>
                <h1>Scentova</h1>
                <div class="add-to-cart-icon" onclick="navigateToCart()">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count">0</span>
                </div>
            </header>

            <!-- Profile Form -->
            <div class="profile-form">
                <h2>Update Profile</h2>
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Enter your name">
                <label for="address">Address</label>
                <input type="text" id="address" placeholder="Enter your address">
                <label for="contact">Contact Details</label>
                <input type="text" id="contact" placeholder="Enter your contact details">
                <label for="password">New Password</label>
                <input type="password" id="password" placeholder="Enter new password">
                <label for="newsletter">Subscribe to Newsletter</label>
                <input type="checkbox" id="newsletter">
                <button onclick="updateProfile()">Update Profile</button>
            </div>
        </div>
    </div>

    <script>
        // Update Profile
        function updateProfile() {
            const name = document.getElementById("name").value;
            const address = document.getElementById("address").value;
            const contact = document.getElementById("contact").value;
            const password = document.getElementById("password").value;
            const newsletter = document.getElementById("newsletter").checked;

            if (!name || !address || !contact) {
                alert("Please fill out all fields.");
                return;
            }

            const profile = {
                name,
                address,
                contact,
                password,
                newsletter,
            };

            // Save profile to localStorage
            localStorage.setItem("profile", JSON.stringify(profile));

            alert("Profile updated successfully!");
        }

        // Navigate to Cart
        function navigateToCart() {
            window.location.href = "cart.html";
        }
    </script>
</body>
</html>
