<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scentova - Home</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f9;
            color: #333;
        }

        .dashboard {
            display: flex;
        }

        .sidebar img {
            width: 100%;
            max-width: 150px;
            height: auto;
            margin: 0 auto 20px;
            display: block;
            border-radius: 10px;
        }

        .sidebar {
            width: 250px;
            background: linear-gradient(180deg, #1e3a8a, #0f2c6d);
            color: white;
            height: 100vh;
            position: fixed;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2);
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            color: #fff;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
            margin: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar ul li {
            margin: 0;
        }

        .sidebar ul li a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            padding: 12px 15px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background-color 0.3s ease;
        }

        .sidebar ul li a:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .sidebar ul li a.active {
            background-color: rgba(255, 255, 255, 0.2);
            font-weight: bold;
        }

        .sidebar ul li a i {
            font-size: 18px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 20px;
            margin-left: 250px; /* Adjusted to match sidebar width */
            padding-left: 40px; /* Added padding to create space */
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #1e3a8a, #0f2c6d);
            padding: 20px 30px;
            color: white;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        header h1 {
            margin: 100;
            font-size: 28px;
        }

        .add-to-cart-icon {
            position: relative;
            cursor: pointer;
        }

        .add-to-cart-icon i {
            font-size: 28px;
            color: white;
        }

        .add-to-cart-icon .cart-count {
            position: absolute;
            top: -10px;
            right: -10px;
            background-color: #ff4757;
            color: white;
            border-radius: 50%;
            padding: 5px 10px;
            font-size: 14px;
        }

        /* Categories */
        .categories {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .categories button {
            background: linear-gradient(90deg, #1e3a8a, #0f2c6d);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            font-size: 18px;
            flex: 1;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .categories button:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
        }

        /* Perfume Grid */
        .perfume-grid {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }

        .perfume-grid.active {
            display: grid;
        }

        .perfume-card {
            background-color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .perfume-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .perfume-card img {
            width: 100%;
            max-width: 200px;
            height: auto;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .perfume-card h3 {
            margin: 0;
            font-size: 22px;
            color: #1e3a8a;
        }

        .perfume-card p {
            font-size: 18px;
            color: #333;
            margin: 15px 0;
        }

        .perfume-card button {
            background: linear-gradient(90deg, #1e3a8a, #0f2c6d);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-size: 16px;
        }

        .perfume-card button:hover {
            background: linear-gradient(90deg, #0f2c6d, #1e3a8a);
        }

        /* Perfume Details Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .modal-content img {
            width: 100%;
            max-width: 200px;
            height: auto;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .modal-content h3 {
            margin: 0;
            font-size: 24px;
            color: #1e3a8a;
        }

        .modal-content p {
            font-size: 18px;
            color: #333;
            margin: 15px 0;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 16px;
        }

        .modal-content button {
            background: linear-gradient(90deg, #1e3a8a, #0f2c6d);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-size: 16px;
        }

        .modal-content button:hover {
            background: linear-gradient(90deg, #0f2c6d, #1e3a8a);
        }

        /* Close Button for Modal */
        .close-modal {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 24px;
            cursor: pointer;
            color: #1e3a8a;
        }

        .close-modal:hover {
            color: #0f2c6d;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <div class="sidebar">
            <h2>SCENTOVA</h2>
            <img src="C:\Users\91911\Desktop\PSD PROJECTT\Customer dasboard\scent-logo-new.png" alt="Scentova Logo" class="sidebar-image">
            <ul>
                <li><a href="#" class="active"><i class="fas fa-home"></i>Home</a></li>
                <li><a href="#" onclick="navigateToCart()"><i class="fas fa-shopping-cart"></i>Cart</a></li>
                <li><a href="#" onclick="navigateToHistory()"><i class="fas fa-history"></i>History</a></li>
                <li><a href="#" onclick="navigateToProfile()"><i class="fas fa-user"></i>Profile</a></li>
                <li><a href="#" onclick="navigateToFeedback()"><i class="fas fa-comment"></i>Feedback</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <header>
                <h1>Scentova</h1>
                <div class="add-to-cart-icon" onclick="navigateToCart()">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count">0</span>
                </div>
            </header>

            <!-- Categories -->
            <div class="categories">
                <button onclick="showPerfumes('all')">All</button>
                <button onclick="showPerfumes('men')">Men</button>
                <button onclick="showPerfumes('women')">Women</button>
                <button onclick="showPerfumes('unisex')">Unisex</button>
            </div>

            <!-- Perfume Grid -->
            <div class="perfume-grid" id="perfumeGrid">
                <!-- Perfume cards will be dynamically added here -->
            </div>
        </div>
    </div>

    <!-- Perfume Details Modal -->
    <div class="modal" id="perfumeModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <img id="modalImage" src="" alt="Perfume Image">
            <h3 id="modalName"></h3>
            <p id="modalDescription"></p>
            <p id="modalPrice"></p>
            <input type="number" id="quantity" min="1" value="1" placeholder="Quantity">
            <button onclick="addToCart()">Add to Cart</button>
        </div>
    </div>

    <script>
        // Sample Perfume Data (Pulled from Admin Dashboard)
        const perfumes = [
            { id: 1, name: "Chanel No. 5", category: "women", image: "https://via.placeholder.com/200", description: "A timeless classic.", price: 120 },
            { id: 2, name: "Dior Sauvage", category: "men", image: "https://via.placeholder.com/200", description: "Bold and masculine.", price: 100 },
            { id: 3, name: "Gucci Bloom", category: "women", image: "https://via.placeholder.com/200", description: "Elegant and floral.", price: 110 },
            { id: 4, name: "YSL Black Opium", category: "women", image: "https://via.placeholder.com/200", description: "Mysterious and addictive.", price: 130 },
            { id: 5, name: "Tom Ford Oud Wood", category: "men", image: "https://via.placeholder.com/200", description: "Rich and woody.", price: 250 },
            { id: 6, name: "Jo Malone Lime Basil & Mandarin", category: "unisex", image: "https://via.placeholder.com/200", description: "Fresh and zesty.", price: 140 },
            { id: 7, name: "Creed Aventus", category: "men", image: "https://via.placeholder.com/200", description: "Powerful and luxurious.", price: 400 },
            { id: 8, name: "Marc Jacobs Daisy", category: "women", image: "https://via.placeholder.com/200", description: "Playful and youthful.", price: 90 },
            { id: 9, name: "Versace Eros", category: "men", image: "https://via.placeholder.com/200", description: "Seductive and bold.", price: 95 },
            { id: 10, name: "Paco Rabanne Invictus", category: "men", image: "https://via.placeholder.com/200", description: "Energetic and sporty.", price: 85 },
        ];

        // Cart Data
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        const cartCount = document.querySelector(".cart-count");

        // Display Perfumes
        function showPerfumes(category = "all") {
            const perfumeGrid = document.getElementById("perfumeGrid");
            perfumeGrid.innerHTML = "";

            const filteredPerfumes = category === "all" ? perfumes : perfumes.filter(p => p.category === category);

            filteredPerfumes.forEach(perfume => {
                const perfumeCard = document.createElement("div");
                perfumeCard.className = "perfume-card";
                perfumeCard.innerHTML = `
                    <img src="${perfume.image}" alt="${perfume.name}">
                    <h3>${perfume.name}</h3>
                    <p>${perfume.description}</p>
                    <p>$${perfume.price}</p>
                    <button onclick="openModal(${perfume.id})">View Details</button>
                `;
                perfumeGrid.appendChild(perfumeCard);
            });

            // Show the perfume grid
            perfumeGrid.classList.add("active");
        }

        // Open Perfume Modal
        function openModal(id) {
            const perfume = perfumes.find(p => p.id === id);
            document.getElementById("modalImage").src = perfume.image;
            document.getElementById("modalName").textContent = perfume.name;
            document.getElementById("modalDescription").textContent = perfume.description;
            document.getElementById("modalPrice").textContent = `$${perfume.price}`;
            document.getElementById("perfumeModal").style.display = "flex";
        }

        // Add to Cart
        function addToCart() {
            const quantity = parseInt(document.getElementById("quantity").value);
            const name = document.getElementById("modalName").textContent;
            const price = parseFloat(document.getElementById("modalPrice").textContent.replace("$", ""));
            const totalPrice = price * quantity;

            cart.push({ name, quantity, totalPrice, image: document.getElementById("modalImage").src });
            localStorage.setItem("cart", JSON.stringify(cart));
            cartCount.textContent = cart.length;

            alert(`${name} added to cart!`);
            closeModal();
        }

        // Close Modal
        function closeModal() {
            document.getElementById("perfumeModal").style.display = "none";
        }

        // Navigate to Cart
        function navigateToCart() {
            window.location.href = "cart.html";
        }

        // Navigate to History
        function navigateToHistory() {
            window.location.href = "order-history.html";
        }

        // Navigate to Profile
        function navigateToProfile() {
            window.location.href = "profile.html";
        }

        // Navigate to Feedback
        function navigateToFeedback() {
            window.location.href = "feedback.html";
        }

        // Initialize with all perfumes
        showPerfumes();
        cartCount.textContent = cart.length;
    </script>
</body>
</html>
